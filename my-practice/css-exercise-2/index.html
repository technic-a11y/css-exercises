<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="practice-2.css">
    <title>Ids and classes
    </title>
</head>
<body>
    <p class="odd">Number-1 I'm a class</p>
    <div id="even">Number-2 I'm an ID</div>
    <p class="odd adjust-font-size">Number-3 I'm a class but cooler</p>
    <div id="four" class="adjust-font-size">Number-4 I'm an another ID</div>
    <p class="odd">Number-5 I'm a class</p>

    <!-- Class and Id's can be adjoined together with a space. -->
</body>
</html>
